{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        #map { height: 600px; }
        body { font-family: Arial, sans-serif; margin: 16px; }
    </style>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
    <h1>Peta Kepadatan Penduduk Indonesia - 2026</h1>
    <div>
        Pilih Provinsi :
        <form method="get" action="{% url 'kepadatan_penduduk' %}" style="display:inline-block;">
            <select name="provinsi_terpilih" style="padding: 4px; margin-right: 8px;" onchange="this.form.submit()">
                <option value="">--Pilih Data--</option>
                {% for prov in provinsi %}
                <option value="{{ prov.id }}" {% if prov.id|stringformat:"s" == provinsi_terpilih %}selected{% endif %}>
                    {{ prov.id }} - {{ prov.name }}
                </option>
                {% endfor %}
            </select>
            <button type="submit">Cari</button>
        </form>
    </div>

    <div id="map"></div>

    <script>
        var map = L.map('map').setView([-2.5, 118.0], 5);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        const provinsiId = "{{ provinsi_terpilih|default:'' }}";

        if (provinsiId) {
            const geojsonUrl = `/static/geojson/province/${provinsiId}.geojson`;

            fetch(geojsonUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Status: ' + response.status);
                    return response.json();
                })
                .then(data => {
                    const geoLayer = L.geoJSON(data, {
                        style: {
                            color: '#333',
                            weight: 1,
                            fillColor: 'red',
                            fillOpacity: 0.5
                        },
                        onEachFeature: function(feature, layer) {
                            let popupContent = '';
                            for (let key in feature.properties) {
                                popupContent += `<b>${key}</b>: ${feature.properties[key]}<br>`;
                            }
                            layer.bindPopup(popupContent);
                        }
                    }).addTo(map);

                    map.fitBounds(geoLayer.getBounds());
                })
                .catch(error => {
                    console.error('Gagal memuat GeoJSON:', error);
                    alert('Gagal memuat GeoJSON: ' + error.message);
                });
        }
    </script>
</body>
</html>
