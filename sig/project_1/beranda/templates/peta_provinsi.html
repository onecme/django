<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        #map { height: 400px; }
        body { font-family: Arial, sans-serif; margin: 16px; }
        .provinsi-list { margin-top: 16px; }
        .provinsi-list li { margin-bottom: 6px; }
    </style>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
    <body>
        <h1 style="text-align:center;color:blue">Peta Provinsi Indonesia</h1>
        <hr/>
        <div>
            Nama Data : 
            <form method="get" action="{% url 'peta_provinsi' %}" style="display:inline-block;">
                <select name="nama_data" style="padding: 4px; margin-right: 8px;" onchange="this.form.submit()">
                    <option value="">--Pilih Data--</option>
                    {% for namadata in data_namadata %}
                        <option value="{{ namadata.id }}"
                         {% if namadata.id|stringformat:"s" == selected_nama_data %}selected{% endif %}>
                         {{ namadata.name }}
                        </option>
                    {% endfor %}
                </select>
                <button type="submit">Cari</button>
            </form>
        </div>
        <div id="map"></div>
        <script>
            var map = L.map('map').setView([-6.4025,106.7942], 5);
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{ maxZoom: 19,
              attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(map);

            {% for provinsi in data_provinsi %}
                L.marker([{{ provinsi.latitude }}, {{ provinsi.longitude }}]).addTo(map)
                    .bindPopup("<b>{{ provinsi.name }}</b><br>Lat: {{ provinsi.latitude }}<br>Lng: {{ provinsi.longitude }}");
            {% endfor %}
        </script>

        <div class="provinsi-list">
            <h2>Daftar Provinsi</h2>
            <table border="1" cellpadding="5" cellspacing="0" width="100%">
                <tr>
                    <th>No</th>
                    <th>Nama Provinsi</th>
                    <th>Latitude</th>
                    <th>Longitude</th>
                </tr>
                {% for provinsi in data_provinsi %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ provinsi.name }}</td>
                    <td>{{ provinsi.latitude }}</td>
                    <td>{{ provinsi.longitude }}</td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </body>
</html>
